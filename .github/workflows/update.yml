name: Update dividend yields
on:
  schedule:
    - cron: '10 0 * * *'   # 毎日 09:10 JST (00:10 UTC)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Update yields
        run: python scripts/update_yields.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-update dividend yields ($(TZ=Asia/Tokyo date +%F))"
          git push
