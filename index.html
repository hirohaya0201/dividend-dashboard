<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>配当ダッシュボード</title>
<style>
body{font-family:'Helvetica Neue',Arial,'Hiragino Sans',sans-serif;background:#1a1a2e;color:#fff;margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px;box-sizing:border-box}
h1{font-size:18px;margin:0 0 10px}
a.card{display:block;width:100%;max-width:420px;background:#232f4a;border-radius:12px;padding:22px 24px;color:#fff;text-decoration:none;border:1px solid #2d3a5a}
a.card:active{background:#2d3a5a}
a.card b{font-size:16px}
a.card span{display:block;font-size:12px;color:#8899bb;margin-top:6px}
</style>
</head>
<body>
<h1>📊 配当ダッシュボード</h1>
<a class="card" href="d1/"><b>ダッシュボード 1</b><span>中小型株など 35銘柄</span></a>
<a class="card" href="d2/"><b>ダッシュボード 2（大型株）</b><span>大型株 15銘柄</span></a>
</body>
</html>
